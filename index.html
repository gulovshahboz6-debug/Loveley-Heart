<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heart</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:radial-gradient(circle,#200010,black);
    font-family:Arial;
    overflow:hidden;
}

button{
    padding:16px 40px;
    font-size:20px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    background:linear-gradient(45deg,#ff004c,#ff2d75);
    color:white;
    font-weight:bold;
    box-shadow:0 0 20px #ff004c;
}

canvas{
    margin-top:20px;
}
</style>
</head>

<body>

<button id="btn" onclick="start()">Нажми</button>
<canvas id="c" width="600" height="600"></canvas>

<script>

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let points = [];
let particles = [];
let i = 0;

function makeHeart(){

    let arr = [];

    for(let t=0; t<Math.PI*2; t+=0.06){

        let x = 16*Math.pow(Math.sin(t),3);
        let y =
            13*Math.cos(t)
            -5*Math.cos(2*t)
            -2*Math.cos(3*t)
            -Math.cos(4*t);

        arr.push({x,y});
    }

    arr.sort(() => Math.random() - 0.5); // хаос

    return arr;
}

function start(){

    // 🔥 убрать кнопку
    document.getElementById("btn").style.display = "none";

    points = makeHeart();
    particles = [];
    i = 0;

    animate();
}

function animate(){

    ctx.clearRect(0,0,600,600);

    for(let p of particles){

        ctx.fillStyle = "#ff1744";
        ctx.shadowColor = "#ff1744";
        ctx.shadowBlur = 10;

        ctx.font = "14px Arial";
        ctx.fillText("I ♥️ You", p.x, p.y);
    }

    if(i < points.length){

        let p = points[i];

        particles.push({
            x: 300 + p.x * 18,
            y: 300 - p.y * 18
        });

        i++;
    }

    // 💖 S по центру
    ctx.fillStyle = "white";
    ctx.shadowColor = "white";
    ctx.shadowBlur = 15;
    ctx.font = "80px serif";
    ctx.fillText("S", 285, 320);

    requestAnimationFrame(animate);
}

</script>

</body>
</html>
