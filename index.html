<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Heart</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:radial-gradient(circle,#200010,black);
    overflow:hidden;
    font-family:Arial;
}

/* КНОПКА */
button{
    padding:16px 42px;
    font-size:22px;
    border:none;
    border-radius:16px;
    cursor:pointer;
    background:linear-gradient(45deg,#ff004c,#ff2d75);
    color:white;
    font-weight:bold;
    box-shadow:
    0 0 15px #ff004c,
    0 0 35px #ff004c;
    transition:0.25s;
}

button:hover{
    transform:scale(1.06);
}

/* СЕРДЦЕ */
.heart{
    position:relative;
    width:700px;
    height:650px;
    display:none;
}

/* ТЕКСТ */
.text{
    position:absolute;
    color:#ff1744;
    font-size:13px;
    font-weight:bold;
    opacity:0;
    white-space:nowrap;
    z-index:1;

    text-shadow:
    0 0 5px #ff1744,
    0 0 10px #ff1744,
    0 0 25px #ff1744;

    animation:show 0.18s forwards;
}

@keyframes show{
    to{opacity:1;}
}

/* S */
.centerS{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    color:white;
    font-size:95px;
    font-family:serif;
    font-style:italic;
    z-index:5;
    text-shadow:
    0 0 10px white,
    0 0 30px white;
}

.hide{display:none;}

</style>
</head>

<body>

<button id="btn" onclick="drawHeart()">Нажми</button>

<div class="heart" id="heart"></div>

<script>

function drawHeart(){

    document.getElementById("btn").classList.add("hide");

    const heart = document.getElementById("heart");

    heart.style.display = "block";
    heart.innerHTML = "";

    // S по центру
    let s = document.createElement("div");
    s.className = "centerS";
    s.innerText = "S";
    heart.appendChild(s);

    setTimeout(()=>{

        let points = [];

        // чуть разреженнее
        for(let t = 0; t < Math.PI * 2; t += 0.06){
            for(let r = 0.15; r <= 1; r += 0.1){

                if(Math.random() < 0.12) continue;

                let x = r * (16 * Math.pow(Math.sin(t),3));
                let y = r * (
                    13 * Math.cos(t)
                    - 5 * Math.cos(2*t)
                    - 2 * Math.cos(3*t)
                    - Math.cos(4*t)
                );

                points.push({x,y});
            }
        }

        points.sort(() => Math.random() - 0.5);

        const fragment = document.createDocumentFragment();

        const rect = heart.getBoundingClientRect();

        // 🔥 ЖЁСТКИЙ ЦЕНТР (без смещений)
        let cx = rect.width / 2;
        let cy = rect.height / 2;

        let scale = Math.min(rect.width, rect.height) * 0.42 / 18;

        points.forEach((p,index)=>{

            let span = document.createElement("span");
            span.className = "text";

            // 🔥 меньше текста (в 3 раза реже)
            span.innerText = "I Love You";

            span.style.left = (cx + p.x * scale) + "px";
            span.style.top  = (cy - p.y * scale) + "px";

            // ещё медленнее → читается лучше
            span.style.animationDelay = (index * 0.01) + "s";

            fragment.appendChild(span);
        });

        heart.appendChild(fragment);

    },400);

}

</script>

</body>
</html>
